<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoC Battle — 戦闘</title>
<link rel="stylesheet" href="css/style.css">
<style>
.battle-layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 0;
}
@media (max-width: 860px) {
  .battle-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
.main-col { border-right: 1px solid var(--border); }
.sidebar  { background: var(--bg2); }

.sidebar-inner { padding: 16px; }

/* match progress list */
.progress-list { display: flex; flex-direction: column; gap: 5px; }
.progress-item {
  font-size: 11px; padding: 5px 8px;
  border: 1px solid var(--border);
  background: var(--bg3);
  display: flex; gap: 6px; align-items: center;
}
.progress-item.current { border-color: var(--gold); }
.progress-item.done    { opacity: .5; }
.progress-item.bye     { opacity: .4; font-style: italic; }
.pi-num { color: var(--text3); font-family:'Share Tech Mono',monospace; font-size:9px; width:16px; }
.pi-name-l { color: var(--blood3); }
.pi-name-r { color: var(--teal3); }
.pi-vs     { color: var(--text4); }
.pi-winner { color: var(--green3); font-size: 10px; margin-left: auto; font-family:'Share Tech Mono',monospace; }

/* champion banner */
.champion-banner {
  display: none;
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  border: 2px solid var(--gold);
  padding: 28px; text-align: center;
  box-shadow: 0 0 50px rgba(200,168,74,.1);
}
.champion-banner.show { display: block; }
.cb-trophy { font-size: 44px; margin-bottom: 8px; }
.cb-label  { font-size:9px; letter-spacing:5px; color:var(--text3); font-family:'Share Tech Mono',monospace; margin-bottom:6px; }
.cb-name   {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(18px,4vw,28px);
  color: var(--gold2);
  text-shadow: 0 0 30px rgba(200,168,74,.5);
  margin-bottom: 4px;
}
.cb-sub { font-size:12px; color:var(--text3); font-style:italic; }
</style>
</head>
<body>
<div id="app">

<div class="page-header" style="padding-bottom:32px">
  <div class="eyebrow">Cthulhu Mythos TRPG — Battle Simulator</div>
  <h1 class="page-title">闘技場</h1>
  <p class="page-sub">The Arena of Fallen Investigators</p>
</div>

<nav class="step-nav">
  <a class="step-nav-item done" href="index.html"><span class="step-num">I</span>ROSTER</a>
  <a class="step-nav-item done" href="bracket.html"><span class="step-num">II</span>BRACKET</a>
  <a class="step-nav-item active" href="battle.html"><span class="step-num">III</span>BATTLE</a>
</nav>

<div class="battle-layout">

  <!-- ── メイン ── -->
  <div class="main-col">
    <div class="section">

      <!-- ラウンド表示 -->
      <div class="round-badge">
        <div class="round-pill" id="roundPill">ROUND 1</div>
      </div>

      <!-- HP ダッシュボード -->
      <div class="hp-dashboard">
        <div class="hp-row">
          <div class="fighter-hp-block" id="hpBlockL"></div>
          <div class="hp-vs">⚔</div>
          <div class="fighter-hp-block" id="hpBlockR" style="text-align:right"></div>
        </div>
      </div>

      <!-- バトルログ -->
      <div class="battle-log" id="battleLog"></div>

      <!-- コントロール -->
      <div class="battle-controls">
        <button class="btn-battle" id="battleBtn" onclick="toggleBattle()" disabled>
          ▶ 戦闘実行
        </button>
        <span style="font-size:10px;color:var(--text3)">速度:</span>
        <button class="btn-speed active" id="spd1" onclick="setSpeed(30,  this)">⚡超高速</button>
        <button class="btn-speed"        id="spd2" onclick="setSpeed(150, this)">▶高速</button>
        <button class="btn-speed"        id="spd3" onclick="setSpeed(500, this)">◎普通</button>
        <button class="btn-speed"        id="spd4" onclick="setSpeed(1200,this)">🐢ゆっくり</button>
      </div>

    </div><!-- /section -->

    <!-- チャンピオンバナー -->
    <div class="champion-banner" id="championBanner">
      <div class="cb-trophy">🏆</div>
      <div class="cb-label">Tournament Champion</div>
      <div class="cb-name" id="cbName">—</div>
      <div class="cb-sub">最後の探索者 — 勝利</div>
      <div style="margin-top:20px">
        <a class="btn" href="index.html" style="text-decoration:none">最初からやり直す</a>
      </div>
    </div>

  </div>

  <!-- ── サイドバー ── -->
  <div class="sidebar">
    <div class="sidebar-inner">

      <!-- キャラ詳細 -->
      <div class="sidebar-card">
        <div class="sidebar-card-title">Fighter Stats</div>
        <div id="charStatsMini"></div>
      </div>

      <!-- バトル統計 -->
      <div class="sidebar-card">
        <div class="sidebar-card-title">Battle Record</div>
        <div class="counter-grid">
          <div class="counter-box"><div class="counter-val" id="cntRound">1</div><div class="counter-lbl">ROUND</div></div>
          <div class="counter-box"><div class="counter-val" id="cntAtk">0</div><div class="counter-lbl">ATTACKS</div></div>
          <div class="counter-box"><div class="counter-val" id="cntDmg">0</div><div class="counter-lbl">DAMAGE</div></div>
          <div class="counter-box"><div class="counter-val" id="cntSan">0</div><div class="counter-lbl">SAN LOST</div></div>
        </div>
      </div>

      <!-- トーナメント進捗 -->
      <div class="sidebar-card" id="progressCard" style="display:none">
        <div class="sidebar-card-title">Tournament Progress</div>
        <div class="progress-list" id="progressList"></div>
      </div>

    </div>
  </div>

</div><!-- /battle-layout -->

</div><!-- /app -->

<!-- ── 試合結果オーバーレイ ── -->
<div class="overlay" id="resultOverlay">
  <div class="overlay-box">
    <div class="overlay-label">Match Result</div>
    <div class="overlay-title" id="ovTitle">決着！</div>
    <div class="overlay-name"  id="ovName"></div>
    <div class="overlay-sub"   id="ovSub"></div>
    <div class="overlay-stats" id="ovStats"></div>
    <div class="overlay-btns"  id="ovBtns"></div>
  </div>
</div>

<script src="js/state.js"></script>
<script src="js/loader.js"></script>
<script src="js/engine.js"></script>
<script>

// ══════════════════════════════════════════════════
//  BATTLE STATE
// ══════════════════════════════════════════════════
const G = {
  // battle live state
  L: null, R: null,
  round: 1,
  turn: 0,        // 0=L攻撃, 1=R攻撃
  initTurn: 0,    // 先攻側
  running: false,
  over: false,
  timer: null,
  speed: 150,
  stats: { attacks:0, dmg:0, sanLost:0 },
  // match tracking
  matches: [],
  matchIdx: 0,
  mode: 'tournament',
};

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
function init() {
  const s = State.get();
  if (!s.matches || s.matches.length === 0) {
    window.location.href = 'bracket.html';
    return;
  }

  G.matches  = s.matches;
  G.matchIdx = s.matchIdx || 0;
  G.mode     = s.mode || 'tournament';
  G.speed    = s.speed || 150;

  setSpeedFromValue(G.speed);

  if (G.mode === 'tournament') {
    document.getElementById('progressCard').style.display = '';
  }

  renderProgressList();
  loadCurrentMatch();
}

// ══════════════════════════════════════════════════
//  MATCH LOADING
// ══════════════════════════════════════════════════
function loadCurrentMatch() {
  // byeをスキップ
  while (G.matchIdx < G.matches.length && G.matches[G.matchIdx].isBye) {
    G.matchIdx++;
  }

  if (G.matchIdx >= G.matches.length) {
    // 全試合終了 → 次ラウンドへ
    advanceRound();
    return;
  }

  const m = G.matches[G.matchIdx];

  // HP・SAN・MPをリセット
  G.L = deepCopy(m.l);
  G.R = deepCopy(m.r);
  resetCharHP(G.L);
  resetCharHP(G.R);

  // 先攻決定（DEX比較、同値なら乱数）
  G.initTurn = G.L.DEX >= G.R.DEX ? 0 : 1;
  G.turn  = G.initTurn;
  G.round = 1;
  G.over  = false;
  G.running = false;
  G.stats = { attacks:0, dmg:0, sanLost:0 };

  // UI初期化
  clearLog();
  updateRoundPill();
  renderHpDashboard();
  renderCharMini();
  updateCounters();
  renderProgressList();

  const btn = document.getElementById('battleBtn');
  btn.disabled = false;
  btn.className = 'btn-battle';
  btn.textContent = '▶ 戦闘実行';

  // ログ開始メッセージ
  addLog({ cls: 'log-round', html: `⟨ MATCH ${G.matchIdx+1} ⟩ ${G.L.name} VS ${G.R.name}` });
  addLog({ cls: 'log-sys',
    html: `先攻判定 — ${G.L.name}: DEX ${G.L.DEX} / ${G.R.name}: DEX ${G.R.DEX}` });
  const first = G.turn === 0 ? G.L : G.R;
  addLog({ cls: 'log-sys',
    html: `先攻: <span class="cn-${G.turn===0?'l':'r'}">${first.name}</span>` });
  addLog({ cls: 'log-round', html: '⟨ ROUND 1 ⟩' });
}

function resetCharHP(c) {
  c.hp  = c.hpMax;
  c.mp  = c.mpMax;
  c.san = c.sanMax;
}

function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

// ══════════════════════════════════════════════════
//  BATTLE LOOP
// ══════════════════════════════════════════════════
function toggleBattle() {
  if (G.over) return;
  if (G.running) pauseBattle();
  else startBattle();
}

function startBattle() {
  G.running = true;
  const btn = document.getElementById('battleBtn');
  btn.className = 'btn-battle running';
  btn.textContent = '⏸ 一時停止';
  scheduleNext();
}

function pauseBattle() {
  G.running = false;
  clearTimeout(G.timer);
  const btn = document.getElementById('battleBtn');
  btn.className = 'btn-battle';
  btn.textContent = '▶ 再開';
}

function scheduleNext() {
  if (!G.running || G.over) return;
  G.timer = setTimeout(() => {
    doOneTurn();
    if (!G.over) scheduleNext();
  }, G.speed);
}

function doOneTurn() {
  const attSide = G.turn === 0 ? 'l' : 'r';
  const defSide = G.turn === 0 ? 'r' : 'l';
  const att = G.turn === 0 ? G.L : G.R;
  const def = G.turn === 0 ? G.R : G.L;

  G.stats.attacks++;

  // 攻撃
  const atkLogs = Engine.doAttack(att, def, attSide, defSide);
  for (const l of atkLogs) addLog(l);

  // ダメージ統計（def.hpはdoAttack内で更新済み）
  G.stats.dmg = countTotalDmg();

  // SAN チェック（防御者）
  const sanLog = Engine.doSanCheck(def, defSide);
  if (sanLog) {
    addLog(sanLog);
    G.stats.sanLost++;
  }

  renderHpDashboard();
  updateCounters();

  // 死亡 or 発狂チェック
  const dead   = def.hp <= 0;
  const insane = sanLog?.insane && Math.random() < 0.3;

  if (dead || insane) {
    def.hp = 0;
    renderHpDashboard();
    if (insane) addLog({ cls:'log-san', html:`<span class="cn-${defSide}">${def.name}</span>は完全に正気を失い、戦闘不能となった…` });
    finishMatch(att, def, attSide);
    return;
  }

  // ターン交代
  G.turn = 1 - G.turn;

  // ラウンド増加（先攻側に戻ったとき）
  if (G.turn === G.initTurn) {
    G.round++;
    updateRoundPill();
    addLog({ cls: 'log-round', html: `⟨ ROUND ${G.round} ⟩` });

    // 100ラウンド上限
    if (G.round > 100) {
      addLog({ cls: 'log-result', html: '戦闘は膠着状態に陥った — 引き分け' });
      G.over = true; G.running = false;
      document.getElementById('battleBtn').disabled = true;
      document.getElementById('battleBtn').className = 'btn-battle';
    }
  }
}

// HP変化の合計を簡易計算
function countTotalDmg() {
  if (!G.L || !G.R) return 0;
  return (G.L.hpMax - G.L.hp) + (G.R.hpMax - G.R.hp);
}

// ══════════════════════════════════════════════════
//  MATCH FINISH
// ══════════════════════════════════════════════════
function finishMatch(winner, loser, winSide) {
  G.over = true;
  G.running = false;
  clearTimeout(G.timer);

  const btn = document.getElementById('battleBtn');
  btn.disabled = true;
  btn.className = 'btn-battle';

  addLog({ cls: 'log-result',
    html: `⚔ <span class="cn-${winSide}">${winner.name}</span> の勝利！（${G.round}ラウンド）` });

  // matchesを更新
  if (G.matchIdx < G.matches.length) {
    G.matches[G.matchIdx].winner = deepCopy(winner);
    G.matches[G.matchIdx].loser  = deepCopy(loser);
  }

  // State保存
  State.update({ matches: G.matches, matchIdx: G.matchIdx });

  renderProgressList();
  showResultOverlay(winner, loser);
}

// ══════════════════════════════════════════════════
//  RESULT OVERLAY
// ══════════════════════════════════════════════════
function showResultOverlay(winner, loser) {
  const hasMore = hasNextMatch();

  document.getElementById('ovTitle').textContent = '決着！';
  document.getElementById('ovName').textContent  = winner.name;
  document.getElementById('ovSub').textContent   =
    `${G.round}ラウンドの激闘を制した`;

  document.getElementById('ovStats').innerHTML = `
    <div class="overlay-stat"><div class="overlay-stat-v">${G.round}</div><div class="overlay-stat-l">ROUNDS</div></div>
    <div class="overlay-stat"><div class="overlay-stat-v">${G.stats.attacks}</div><div class="overlay-stat-l">ATTACKS</div></div>
    <div class="overlay-stat"><div class="overlay-stat-v">${G.stats.dmg}</div><div class="overlay-stat-l">DAMAGE</div></div>
  `;

  let btns = `<button class="btn" onclick="closeOverlay()">ログを確認</button>`;
  if (G.mode === 'tournament' && hasMore) {
    btns += `<button class="btn btn-primary" onclick="nextMatch()">次の試合へ →</button>`;
  } else if (G.mode === 'tournament' && !hasMore) {
    btns += `<button class="btn btn-primary" onclick="tryAdvanceRound()">次のラウンドへ →</button>`;
  } else {
    btns += `<a class="btn btn-primary" href="index.html">最初からやり直す</a>`;
  }

  document.getElementById('ovBtns').innerHTML = btns;
  document.getElementById('resultOverlay').classList.add('show');
}

function closeOverlay() {
  document.getElementById('resultOverlay').classList.remove('show');
}

function hasNextMatch() {
  const next = G.matchIdx + 1;
  // 残りに bye でない試合があるか
  for (let i = next; i < G.matches.length; i++) {
    if (!G.matches[i].isBye) return true;
  }
  return false;
}

function nextMatch() {
  closeOverlay();
  G.matchIdx++;
  State.update({ matches: G.matches, matchIdx: G.matchIdx });
  loadCurrentMatch();
}

function tryAdvanceRound() {
  closeOverlay();
  advanceRound();
}

// ══════════════════════════════════════════════════
//  TOURNAMENT ADVANCE
// ══════════════════════════════════════════════════
function advanceRound() {
  const winners = G.matches.filter(m => m.winner).map(m => deepCopy(m.winner));

  if (winners.length <= 1) {
    showChampion(winners[0] || G.L);
    return;
  }

  const nextMatches = Engine.buildNextRound(G.matches);
  if (!nextMatches) {
    showChampion(winners[0]);
    return;
  }

  // byeが1件で参加者が1人になるケース
  const realWinners = winners.filter(Boolean);
  if (realWinners.length === 1) {
    showChampion(realWinners[0]);
    return;
  }

  G.matches  = nextMatches;
  G.matchIdx = 0;
  State.update({ matches: G.matches, matchIdx: 0 });

  addLog({ cls:'log-round',
    html: `⟨ ROUND ${nextMatches[0]?.round || '?'} 開始 — ${realWinners.length}名が残った ⟩` });

  renderProgressList();
  loadCurrentMatch();
}

function showChampion(champ) {
  if (!champ) return;
  addLog({ cls:'log-result', html:`🏆 トーナメント優勝: ${champ.name}` });
  document.getElementById('cbName').textContent = champ.name;
  document.getElementById('championBanner').classList.add('show');
  document.getElementById('resultOverlay').classList.remove('show');
}

// ══════════════════════════════════════════════════
//  UI RENDERING
// ══════════════════════════════════════════════════
function renderHpDashboard() {
  if (!G.L || !G.R) return;

  document.getElementById('hpBlockL').innerHTML = hpBlockHTML(G.L, 'l');
  document.getElementById('hpBlockR').innerHTML = hpBlockHTML(G.R, 'r');
}

function hpBlockHTML(c, side) {
  const hp  = Math.max(0, c.hp);
  const hpP = pct(hp, c.hpMax);
  const mpP = pct(c.mp, c.mpMax);
  const snP = pct(c.san, c.sanMax);
  const isRight = side === 'r';

  return `
    <div class="fighter-name ${side}">${c.name}</div>
    <div class="bar-row" style="${isRight?'flex-direction:row-reverse':''}">
      <div class="bar-label" style="${isRight?'text-align:right':''}">HP</div>
      <div class="bar-track" style="flex:1">
        <div class="bar-fill hp-${side}" style="width:${hpP}%${isRight?';margin-left:auto':''}"></div>
      </div>
      <div class="bar-value">${hp}/${c.hpMax}</div>
    </div>
    <div class="bar-row" style="${isRight?'flex-direction:row-reverse':''}">
      <div class="bar-label" style="${isRight?'text-align:right':''}">MP</div>
      <div class="bar-track" style="flex:1">
        <div class="bar-fill mp" style="width:${mpP}%"></div>
      </div>
      <div class="bar-value">${c.mp}/${c.mpMax}</div>
    </div>
    <div class="bar-row" style="${isRight?'flex-direction:row-reverse':''}">
      <div class="bar-label" style="${isRight?'text-align:right':''}">SAN</div>
      <div class="bar-track" style="flex:1">
        <div class="bar-fill san" style="width:${snP}%"></div>
      </div>
      <div class="bar-value">${c.san}/${c.sanMax}</div>
    </div>
  `;
}

function pct(cur, max) {
  if (!max) return 0;
  return Math.max(0, Math.min(100, Math.round(cur / max * 100)));
}

function renderCharMini() {
  if (!G.L || !G.R) return;
  document.getElementById('charStatsMini').innerHTML =
    charMiniHTML(G.L, 'l') + charMiniHTML(G.R, 'r');
}

function charMiniHTML(c, side) {
  const stats = [
    ['STR', c.STR], ['DEX', c.DEX],
    ['CON', c.CON], ['POW', c.POW],
  ];
  const weapons = (c.weapons || []).filter(w => !w.unarmed).slice(0, 3);
  if (weapons.length === 0) weapons.push(...(c.weapons||[]).slice(0,2));

  return `<div class="char-mini">
    <div class="char-mini-name ${side}">${c.name}</div>
    <div class="mini-grid">
      ${stats.map(([k,v])=>`
        <div class="mini-stat">
          <div class="mini-stat-l">${k}</div>
          <div class="mini-stat-v">${v||'—'}</div>
        </div>`).join('')}
    </div>
    <div class="mini-weapons">
      ${weapons.map(w=>`
        <div class="mini-weapon">
          <span>${w.name}</span>
          <span class="mini-w-dmg">${w.dmg}(${w.hit}%)</span>
        </div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:4px">
      回避:${c.dodge}% / DB:${c.db?.label||'?'}
    </div>
  </div>`;
}

function renderProgressList() {
  const el = document.getElementById('progressList');
  if (!el) return;

  el.innerHTML = G.matches.map((m, i) => {
    const isCur  = i === G.matchIdx;
    const isDone = m.winner !== null;
    const isBye  = m.isBye;
    const cls    = isBye ? 'bye' : isDone ? 'done' : isCur ? 'current' : '';

    const tagCls  = isCur ? 'cur' : isDone ? 'win' : isBye ? 'bye' : 'wait';
    const tagText = isCur ? '▶NOW' : isDone ? '✓' : isBye ? 'BYE' : '待';

    return `<div class="progress-item ${cls}">
      <span class="pi-num">${i+1}</span>
      <span class="mq-tag ${tagCls}">${tagText}</span>
      <span class="pi-name-l">${m.l?.name||'?'}</span>
      <span class="pi-vs">vs</span>
      <span class="pi-name-r">${m.r?.name||'—'}</span>
      ${isDone && m.winner ? `<span class="pi-winner">→${m.winner.name}</span>` : ''}
    </div>`;
  }).join('');
}

function updateRoundPill() {
  document.getElementById('roundPill').textContent = `ROUND ${G.round}`;
  document.getElementById('cntRound').textContent  = G.round;
}

function updateCounters() {
  document.getElementById('cntAtk').textContent = G.stats.attacks;
  document.getElementById('cntDmg').textContent = G.stats.dmg;
  document.getElementById('cntSan').textContent = G.stats.sanLost;
}

function addLog(entry) {
  const log  = document.getElementById('battleLog');
  const line = document.createElement('div');
  line.className = 'log-line ' + (entry.cls || '');
  line.innerHTML = entry.html;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function clearLog() {
  document.getElementById('battleLog').innerHTML = '';
}

// ── 速度 ─────────────────────────────────────────
function setSpeed(ms, el) {
  G.speed = ms;
  document.querySelectorAll('.btn-speed').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function setSpeedFromValue(ms) {
  const map = { 30:'spd1', 150:'spd2', 500:'spd3', 1200:'spd4' };
  document.querySelectorAll('.btn-speed').forEach(b => b.classList.remove('active'));
  const id = map[ms];
  if (id) document.getElementById(id)?.classList.add('active');
  G.speed = ms;
}

init();
