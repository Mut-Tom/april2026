<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoC Battle — 対戦表</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ─── 1v1 ピッカー ─── */
.picker-grid {
  display: grid;
  grid-template-columns: 1fr 60px 1fr;
  gap: 12px; align-items: start;
  margin-bottom: 24px;
}
.picker-col-title {
  font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text3); margin-bottom: 8px;
  font-family: 'Share Tech Mono', monospace;
}
.pick-vs {
  display: flex; align-items: center; justify-content: center;
  padding-top: 36px;
  font-family: 'Cinzel Decorative', serif;
  font-size: 22px; color: var(--gold);
  text-shadow: 0 0 20px rgba(200,168,74,.4);
}

/* ─── トーナメント表 ─── */
.tournament-header {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 12px 18px;
  margin-bottom: 20px;
}
.t-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing: 3px;
  border: 1px solid var(--border2);
  padding: 3px 10px;
  color: var(--gold); background: var(--bg3);
}
.t-desc { font-size: 13px; color: var(--text2); }

.match-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px; margin-bottom: 24px;
}
.match-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 12px 14px;
}
.match-card-title {
  font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text3);
  font-family: 'Share Tech Mono', monospace;
  margin-bottom: 10px;
}
.match-fighters {
  display: flex; align-items: center; gap: 8px;
}
.match-fighter {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 8px 10px;
}
.match-fighter-name { font-size: 13px; font-weight: 700; }
.match-fighter-name.bye { color: var(--text4); font-style: italic; }
.match-fighter-meta { font-size: 10px; color: var(--text3); margin-top: 2px; font-family:'Share Tech Mono',monospace; }
.match-sep {
  font-family: 'Cinzel Decorative', serif;
  font-size: 12px; color: var(--gold);
  flex-shrink: 0;
}
</style>
</head>
<body>
<div id="app">

<div class="page-header" style="padding-bottom:32px">
  <div class="eyebrow">Cthulhu Mythos TRPG — Battle Simulator</div>
  <h1 class="page-title">闘技場</h1>
  <p class="page-sub">The Arena of Fallen Investigators</p>
</div>

<nav class="step-nav">
  <a class="step-nav-item done" href="index.html"><span class="step-num">I</span>ROSTER</a>
  <a class="step-nav-item active" href="bracket.html"><span class="step-num">II</span>BRACKET</a>
  <a class="step-nav-item disabled" href="battle.html" id="navBattle"><span class="step-num">III</span>BATTLE</a>
</nav>

<div class="section">
  <div id="bracketContent"><!-- JS で描画 --></div>

  <div style="text-align:center;margin-top:8px">
    <button class="btn btn-primary" id="startBtn" onclick="startBattle()">
      ⚔ 戦闘開始
    </button>
    <p style="font-size:11px;color:var(--text3);margin-top:8px" id="startNote"></p>
  </div>
</div>

</div><!-- /app -->

<script src="js/state.js"></script>
<script src="js/engine.js"></script>
<script>

const S = State.get();
const roster = S.roster.filter(c => c._status === 'ok');

if (roster.length < 2) {
  window.location.href = 'index.html';
}

// ── 初期描画 ──────────────────────────────────────
if (S.mode === '1v1') {
  render1v1();
} else {
  renderTournament();
}

// ── 1v1 ──────────────────────────────────────────
function render1v1() {
  const el = document.getElementById('bracketContent');
  const opts = roster.map((c, i) =>
    `<label class="radio-opt">
      <input type="radio" name="pick${i < 0 ? 'L' : 'L'}" value="${i}">
      <div class="radio-opt-content">
        <div class="radio-opt-label">${c.name}</div>
        <div class="radio-opt-sub">${c.job || '探索者'} / HP:${c.hpMax} DEX:${c.DEX}</div>
      </div>
    </label>`
  ).join('');

  el.innerHTML = `
    <div class="section-title">対戦相手を選択</div>
    <div class="picker-grid">
      <div>
        <div class="picker-col-title">🩸 第一の探索者</div>
        <div id="pickL" class="radio-group-v">${
          roster.map((c,i) => `
            <label class="radio-opt" style="margin-bottom:6px">
              <input type="radio" name="pickL" value="${i}" onchange="syncRadioOpt('pickL')">
              <div class="radio-opt-content">
                <div class="radio-opt-label" style="color:var(--blood3)">${c.name}</div>
                <div class="radio-opt-sub">${c.job||'探索者'} · HP:${c.hpMax} DEX:${c.DEX}</div>
              </div>
            </label>`).join('')}
        </div>
      </div>
      <div class="pick-vs">VS</div>
      <div>
        <div class="picker-col-title">🌊 第二の探索者</div>
        <div id="pickR" class="radio-group-v">${
          roster.map((c,i) => `
            <label class="radio-opt" style="margin-bottom:6px">
              <input type="radio" name="pickR" value="${i}" onchange="syncRadioOpt('pickR')">
              <div class="radio-opt-content">
                <div class="radio-opt-label" style="color:var(--teal3)">${c.name}</div>
                <div class="radio-opt-sub">${c.job||'探索者'} · HP:${c.hpMax} DEX:${c.DEX}</div>
              </div>
            </label>`).join('')}
        </div>
      </div>
    </div>
  `;

  document.getElementById('startNote').textContent = '両サイドを選択してください';
  document.getElementById('startBtn').disabled = true;

  // 選択状態の監視
  document.addEventListener('change', () => {
    const l = document.querySelector('input[name="pickL"]:checked');
    const r = document.querySelector('input[name="pickR"]:checked');
    document.getElementById('startBtn').disabled = !l || !r;
    if (l && r && l.value === r.value) {
      document.getElementById('startNote').textContent = '⚠ 同じキャラクターは選べません';
      document.getElementById('startBtn').disabled = true;
    } else if (l && r) {
      document.getElementById('startNote').textContent = '';
    }
  });
}

function syncRadioOpt(groupId) {
  document.querySelectorAll(`input[name="${groupId}"]`).forEach(inp => {
    inp.closest('.radio-opt').classList.toggle('selected', inp.checked);
  });
}

// ── トーナメント ──────────────────────────────────
function renderTournament() {
  const matches = Engine.buildTournament(roster);

  // Stateに保存
  State.update({ matches, matchIdx: 0 });

  const el = document.getElementById('bracketContent');
  el.innerHTML = `
    <div class="tournament-header">
      <span class="t-badge">TOURNAMENT</span>
      <span class="t-desc">${roster.length}名が参加 — シングルエリミネーション</span>
    </div>
    <div class="section-title">第1ラウンド 対戦表</div>
    <div class="match-cards">
      ${matches.map((m, i) => `
        <div class="match-card">
          <div class="match-card-title">MATCH ${i + 1}${m.isBye ? '　— 不戦勝' : ''}</div>
          <div class="match-fighters">
            <div class="match-fighter">
              <div class="match-fighter-name" style="color:var(--blood3)">${m.l.name}</div>
              <div class="match-fighter-meta">HP:${m.l.hpMax} DEX:${m.l.DEX}</div>
            </div>
            <div class="match-sep">${m.isBye ? '　' : 'VS'}</div>
            <div class="match-fighter">
              ${m.r
                ? `<div class="match-fighter-name" style="color:var(--teal3)">${m.r.name}</div>
                   <div class="match-fighter-meta">HP:${m.r.hpMax} DEX:${m.r.DEX}</div>`
                : `<div class="match-fighter-name bye">（不戦勝）</div>`}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('navBattle').classList.remove('disabled');
  document.getElementById('startNote').textContent = `${matches.filter(m=>!m.isBye).length} 試合が行われます`;
}

// ── 戦闘開始 ─────────────────────────────────────
function startBattle() {
  const s = State.get();

  if (s.mode === '1v1') {
    const li = document.querySelector('input[name="pickL"]:checked');
    const ri = document.querySelector('input[name="pickR"]:checked');
    if (!li || !ri) { alert('両サイドを選択してください'); return; }
    if (li.value === ri.value) { alert('同じキャラクターは選べません'); return; }

    const L = JSON.parse(JSON.stringify(roster[parseInt(li.value)]));
    const R = JSON.parse(JSON.stringify(roster[parseInt(ri.value)]));
    const matches = [{ id:0, l:L, r:R, winner:null, loser:null, isBye:false, round:1 }];
    State.update({ matches, matchIdx: 0 });
  }

  window.location.href = 'battle.html';
}
</script>
</body>
</html>
